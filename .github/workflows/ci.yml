name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test
        env:
          JWT_ACCESS_SECRET: ci-access
          JWT_REFRESH_SECRET: ci-refresh
          JWT_GUEST_SECRET: ci-guest
          MONGODB_URI: mongodb://127.0.0.1:27017
          MONGODB_DB_NAME: restaurent_ci
          REDIS_URL: redis://127.0.0.1:6379

      - name: Build
        run: npm run build
